<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Creator Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #7b2ff7;
      --accent: #ff006e;
      --dark: #0a0e27;
      --darker: #050816;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --glow: rgba(0, 245, 255, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Tajawal", system-ui;
      background: var(--darker);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: pan-y;
    }

    .tech-bg {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.15) 0%, transparent 50%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 245, 255, 0.1);
      border-radius: 30px;
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
    }

    .ai-logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .ai-logo h1 {
      font-size: 28px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .ai-logo p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .eye-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      padding: 15px;
      margin: -15px;
      z-index: 10;
    }

    .eye-icon:active {
      color: var(--primary);
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 15px 50px;
      border-radius: 12px;
      border: 1px solid rgba(0, 245, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .hidden {
      display: none !important;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      display: block;
    }

    @media (max-width: 768px) {
      .card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="tech-bg"></div>

  <div class="container">
    <!-- LOGIN PAGE -->
    <div class="card" id="loginPage">
      <div class="ai-logo">
        <h1><i class="fas fa-brain"></i> AI CREATOR CONSOLE</h1>
        <p>نظام نشر ذكي متقدم</p>
      </div>

      <div class="form-group">
        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
        <div class="input-wrapper">
          <input 
            type="email" 
            id="emailInput" 
            placeholder="name@ahmedmarketing.cloud"
            autocomplete="email">
          <i class="fas fa-user input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-key"></i> الرمز السري</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="codeInput" 
            placeholder="أدخل الرمز السري"
            autocomplete="current-password">
          <i class="fas fa-lock input-icon"></i>
          <i class="fas fa-eye eye-icon" id="togglePassword"></i>
        </div>
      </div>

      <button type="button" class="btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        <span id="btnText">تسجيل الدخول</span>
      </button>

      <div class="status" id="statusDiv"></div>
    </div>

    <!-- SUCCESS PAGE -->
    <div class="card hidden" id="successPage">
      <div class="ai-logo">
        <h1><i class="fas fa-check-circle"></i> نجاح!</h1>
        <p>تم تسجيل الدخول بنجاح</p>
      </div>
      <button type="button" class="btn" onclick="window.location.reload()">
        <i class="fas fa-arrow-left"></i> رجوع
      </button>
    </div>
  </div>

  <script>
    console.log('🚀 App loaded');
    console.log('📱 Device:', navigator.userAgent);

    // SHA-256
    async function sha256(message) {
      try {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
      } catch (error) {
        console.error('SHA-256 error:', error);
        throw error;
      }
    }

    const USERS_DB_KEY = 'aiCreatorUsers_v2';

    function getUsers() {
      try {
        const users = localStorage.getItem(USERS_DB_KEY);
        if (!users) {
          const defaultUsers = {
            "controller@ahmedmarketing.cloud": {
              name: "المالك الرئيسي",
              codeHash: "9bfdca9597bac776ccdd7ce3b569469ad4ae3ac72a3948e1ebb6738aad736359",
              role: "admin",
              status: "active"
            },
            "ali@ahmedmarketing.cloud": {
              name: "علي محمد",
              codeHash: "d5083e34522626dd10e151c78c1ba502a3d67427b752c3fd43bd3b944072d1e7",
              role: "user",
              status: "active"
            },
            "sjaad@ahmedmarketing.cloud": {
              name: "سجاد",
              codeHash: "d5a65b667f26c7f176a211510a8f6ba639c371b7979ea258d289fd1604ae6c28",
              role: "user",
              status: "active"
            },
            "admin@ahmedmarketing.cloud": {
              name: "mkd",
              codeHash: "21817c78a3ba029c98dfa049d5edc500cda26d00d3a2c6b47cc6e7062a689ef0",
              role: "user",
              status: "active"
            }
          };
          localStorage.setItem(USERS_DB_KEY, JSON.stringify(defaultUsers));
          console.log('✅ Default users created');
          return defaultUsers;
        }
        console.log('✅ Users loaded');
        return JSON.parse(users);
      } catch (error) {
        console.error('localStorage error:', error);
        return {};
      }
    }

    // Toggle Password
    const togglePassword = document.getElementById('togglePassword');
    const codeInput = document.getElementById('codeInput');
    
    function togglePass(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      
      const type = codeInput.getAttribute('type') === 'password' ? 'text' : 'password';
      codeInput.setAttribute('type', type);
      
      if (type === 'text') {
        togglePassword.classList.remove('fa-eye');
        togglePassword.classList.add('fa-eye-slash');
      } else {
        togglePassword.classList.remove('fa-eye-slash');
        togglePassword.classList.add('fa-eye');
      }
      
      console.log('👁️ Password toggled');
    }
    
    if (togglePassword) {
      togglePassword.addEventListener('click', togglePass);
      togglePassword.addEventListener('touchstart', togglePass, { passive: false });
    }

    // Login Function
    async function handleLogin() {
      const loginBtn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      const statusDiv = document.getElementById('statusDiv');
      
      loginBtn.disabled = true;
      btnText.textContent = 'جار التحقق...';
      statusDiv.style.display = 'none';
      
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const code = document.getElementById('codeInput').value.trim();

      console.log('🔐 Login attempt:', email);

      try {
        if (!email || !code) {
          throw new Error('املأ جميع الحقول');
        }

        const users = getUsers();
        console.log('📦 Users loaded:', Object.keys(users));

        if (!users[email]) {
          console.log('❌ User not found');
          throw new Error('بيانات الدخول غير صحيحة');
        }

        console.log('✅ User exists');

        const enteredCodeHash = await sha256(code);
        console.log('🔒 Entered hash:', enteredCodeHash);
        console.log('🔒 Stored hash:', users[email].codeHash);
        
        if (users[email].codeHash !== enteredCodeHash) {
          console.log('❌ Password mismatch');
          throw new Error('بيانات الدخول غير صحيحة');
        }

        console.log('✅ Password correct');

        if (users[email].status === 'disabled') {
          throw new Error('هذا الحساب معطل');
        }

        console.log('✅ Login successful!');
        
        // Show success
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('successPage').classList.remove('hidden');

      } catch (error) {
        console.error('❌ Login error:', error);
        statusDiv.className = 'status error';
        statusDiv.textContent = '❌ ' + error.message;
        btnText.textContent = 'تسجيل الدخول';
        loginBtn.disabled = false;
      }
    }

    // Attach login to button
    document.getElementById('loginBtn').addEventListener('click', handleLogin);

    // Enter key support
    document.getElementById('codeInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleLogin();
      }
    });

    document.getElementById('emailInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('codeInput').focus();
      }
    });

    // Initialize
    window.addEventListener('load', function() {
      console.log('🧪 Testing localStorage...');
      try {
        localStorage.setItem('test', 'test');
        localStorage.removeItem('test');
        console.log('✅ localStorage works');
        getUsers();
      } catch (error) {
        console.error('❌ localStorage error:', error);
        alert('⚠️ المتصفح لا يدعم التخزين المحلي');
      }
    });
  </script>
</body>
</html>
