<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Creator Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #7b2ff7;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --darker: #050816;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: "Tajawal", sans-serif;
      background: var(--darker);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .card {
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 245, 255, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .input-wrapper {
      position: relative;
    }
    input {
      width: 100%;
      padding: 15px 50px;
      border-radius: 12px;
      border: 1px solid rgba(0, 245, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    .input-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .eye-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      padding: 15px;
      z-index: 10;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }
    .status {
      text-align: center;
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      display: block;
    }
    .status.success {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      display: block;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="loginPage">
      <h1><i class="fas fa-brain"></i> AI CREATOR CONSOLE</h1>
      
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
        <div class="input-wrapper">
          <input type="email" id="emailInput" placeholder="name@ahmedmarketing.cloud">
          <i class="fas fa-user input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-key"></i> الرمز السري</label>
        <div class="input-wrapper">
          <input type="password" id="codeInput" placeholder="أدخل الرمز السري">
          <i class="fas fa-lock input-icon"></i>
          <i class="fas fa-eye eye-icon" id="togglePassword"></i>
        </div>
      </div>

      <button type="button" class="btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        <span id="btnText">تسجيل الدخول</span>
      </button>

      <div class="status" id="statusDiv"></div>
    </div>

    <div class="card hidden" id="successPage">
      <h1><i class="fas fa-check-circle"></i> نجاح!</h1>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">
        تم تسجيل الدخول بنجاح
      </p>
      <button class="btn" onclick="window.location.reload()">
        <i class="fas fa-arrow-left"></i> رجوع
      </button>
    </div>
  </div>

  <script>
    console.log('🚀 App started');

    // Supabase Config
    const SUPABASE_URL = 'https://sljhtwxwdluraptvsngr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsamh0d3h3ZGx1cmFwdHZzbmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NjIwMzEsImV4cCI6MjA4NjEzODAzMX0.nI4Qbfwhyuxg_FCwiZz-bnCpBvBqt7PgpuJD-wRUwJA';

    let supabase;

    try {
      const { createClient } = window.supabase;
      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      console.log('✅ Supabase connected');
    } catch (error) {
      console.error('❌ Supabase error:', error);
    }

    // SHA-256
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Default users (fallback)
    const DEFAULT_USERS = {
      "controller@ahmedmarketing.cloud": {
        name: "المالك الرئيسي",
        codeHash: "9bfdca9597bac776ccdd7ce3b569469ad4ae3ac72a3948e1ebb6738aad736359",
        role: "admin",
        status: "active"
      },
      "ali@ahmedmarketing.cloud": {
        name: "علي محمد",
        codeHash: "d5083e34522626dd10e151c78c1ba502a3d67427b752c3fd43bd3b944072d1e7",
        role: "user",
        status: "active"
      },
      "sjaad@ahmedmarketing.cloud": {
        name: "سجاد",
        codeHash: "d5a65b667f26c7f176a211510a8f6ba639c371b7979ea258d289fd1604ae6c28",
        role: "user",
        status: "active"
      },
      "admin@ahmedmarketing.cloud": {
        name: "mkd",
        codeHash: "21817c78a3ba029c98dfa049d5edc500cda26d00d3a2c6b47cc6e7062a689ef0",
        role: "user",
        status: "active"
      }
    };

    // Toggle Password
    const togglePassword = document.getElementById('togglePassword');
    const codeInput = document.getElementById('codeInput');
    
    function togglePass(e) {
      if (e) e.preventDefault();
      const type = codeInput.type === 'password' ? 'text' : 'password';
      codeInput.type = type;
      togglePassword.className = type === 'text' ? 'fas fa-eye-slash eye-icon' : 'fas fa-eye eye-icon';
    }
    
    if (togglePassword) {
      togglePassword.addEventListener('click', togglePass);
      togglePassword.addEventListener('touchstart', togglePass, { passive: false });
    }

    // Login Function
    async function handleLogin() {
      const loginBtn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      const statusDiv = document.getElementById('statusDiv');
      
      loginBtn.disabled = true;
      btnText.textContent = 'جار التحقق...';
      statusDiv.style.display = 'none';
      
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const code = document.getElementById('codeInput').value.trim();

      console.log('🔐 Login attempt:', email);

      try {
        if (!email || !code) {
          throw new Error('املأ جميع الحقول');
        }

        // Check in default users first
        if (DEFAULT_USERS[email]) {
          console.log('✅ User found in defaults');
          
          const enteredCodeHash = await sha256(code);
          console.log('🔒 Hash check');
          
          if (DEFAULT_USERS[email].codeHash === enteredCodeHash) {
            console.log('✅ Password correct');
            
            if (DEFAULT_USERS[email].status === 'disabled') {
              throw new Error('هذا الحساب معطل');
            }

            // Success
            console.log('✅ Login successful!');
            statusDiv.className = 'status success';
            statusDiv.textContent = '✅ تم تسجيل الدخول بنجاح!';
            
            setTimeout(() => {
              document.getElementById('loginPage').classList.add('hidden');
              document.getElementById('successPage').classList.remove('hidden');
            }, 1000);
            
            return;
          } else {
            console.log('❌ Password mismatch');
            throw new Error('بيانات الدخول غير صحيحة');
          }
        }

        // If not in defaults, check Supabase
        console.log('🔍 Checking Supabase...');
        
        if (!supabase) {
          throw new Error('بيانات الدخول غير صحيحة');
        }

        // Query users table (if exists)
        try {
          const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('email', email)
            .single();

          if (error) {
            console.log('❌ Supabase query error:', error);
            throw new Error('بيانات الدخول غير صحيحة');
          }

          if (!data) {
            throw new Error('بيانات الدخول غير صحيحة');
          }

          const enteredCodeHash = await sha256(code);
          
          if (data.code_hash !== enteredCodeHash) {
            throw new Error('بيانات الدخول غير صحيحة');
          }

          if (data.status === 'disabled') {
            throw new Error('هذا الحساب معطل');
          }

          console.log('✅ Login successful via Supabase!');
          document.getElementById('loginPage').classList.add('hidden');
          document.getElementById('successPage').classList.remove('hidden');

        } catch (supabaseError) {
          console.log('❌ Supabase error:', supabaseError);
          throw new Error('بيانات الدخول غير صحيحة');
        }

      } catch (error) {
        console.error('❌ Login error:', error);
        statusDiv.className = 'status error';
        statusDiv.textContent = '❌ ' + error.message;
        btnText.textContent = 'تسجيل الدخول';
        loginBtn.disabled = false;
      }
    }

    // Attach login
    document.getElementById('loginBtn').addEventListener('click', handleLogin);

    // Enter key
    document.addEventListener('DOMContentLoaded', function() {
      const emailInput = document.getElementById('emailInput');
      const codeInput = document.getElementById('codeInput');
      
      if (emailInput) {
        emailInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            codeInput.focus();
          }
        });
      }
      
      if (codeInput) {
        codeInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            handleLogin();
          }
        });
      }
    });

    console.log('✅ Ready');
  </script>
</body>
</html>
